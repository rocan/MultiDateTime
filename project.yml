name: MultiDateTime
options:
  bundleIdPrefix: com.zzc
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""   # Set your Team ID locally — do not commit
    CODE_SIGN_STYLE: Automatic

targets:

  MultiDateTime:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: MultiDateTime
        excludes:
          - "**/*.entitlements"
    entitlements:
      path: MultiDateTime/MultiDateTime.entitlements
    info:
      path: MultiDateTime/Info.plist
      properties:
        CFBundleDisplayName: Global Date Time
        CFBundleName: MultiDateTime
        NSSupportsLiveActivities: true
        NSPhotoLibraryUsageDescription: "Global Date Time uses your photos as widget backgrounds. Favorites and People photos are used first."
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zzc.multidatetime
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: MultiDateTimeWidgets
        embed: true
      - sdk: Photos.framework

  MultiDateTimeWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26"
    sources:
      - path: MultiDateTimeWidgets
        excludes:
          - "**/*.entitlements"
      - path: MultiDateTime/Models/ClockEntry.swift
      - path: MultiDateTime/Models/TimeFormat.swift
      - path: MultiDateTime/Models/LiveActivityAttributes.swift
    entitlements:
      path: MultiDateTimeWidgets/MultiDateTimeWidgets.entitlements
    info:
      path: MultiDateTimeWidgets/Info.plist
      properties:
        CFBundleDisplayName: MultiDateTimeWidgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zzc.multidatetime.widgets
        SKIP_INSTALL: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: WIDGET_EXTENSION
    dependencies:
      - framework: WidgetKit.framework
        weak: false
      - framework: SwiftUI.framework
        weak: false
      - framework: ActivityKit.framework
        weak: false

schemes:
  MultiDateTime:
    build:
      targets:
        MultiDateTime: all
        MultiDateTimeWidgets: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
